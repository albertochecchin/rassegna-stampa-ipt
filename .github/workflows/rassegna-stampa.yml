name: Rassegna Stampa IPT

on:
  schedule:
    # Ogni giorno alle 06:00 UTC (08:00 ora italiana)
    - cron: '0 6 * * *'
  # Permette anche l'avvio manuale dal pulsante "Run workflow"
  workflow_dispatch:

jobs:
  rassegna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install anthropic

      - name: Genera e invia rassegna stampa
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python rassegna_stampa.py
