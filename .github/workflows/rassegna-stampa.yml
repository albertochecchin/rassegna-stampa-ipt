name: Rassegna Stampa IPT

on:
  schedule:
    # Ogni giorno alle 06:00 UTC (08:00 ora italiana)
    - cron: '0 6 */10 * *'
    workflow_dispatch:

permissions:
  contents: write

jobs:
  rassegna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install anthropic

      - name: Genera e invia rassegna stampa
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python rassegna_stampa.py

      - name: Salva rassegna nello storico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rassegne/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Rassegna del $(date +%Y-%m-%d)" && git push)
